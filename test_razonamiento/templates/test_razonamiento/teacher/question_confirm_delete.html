{% extends 'test_razonamiento/base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body p-5 text-center">
                <h3 class="text-danger mb-4">¿Eliminar Pregunta?</h3>
                <p>Estás a punto de eliminar la pregunta <strong>"{{ object.title }}"</strong>. Esta acción no se puede deshacer y afectará a los tests que la utilicen.</p>
                
                <form method="post" class="mt-4">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger btn-lg px-4 me-2">Sí, Eliminar</button>
                    <a href="{% url 'test_razonamiento:question_list' %}" class="btn btn-light btn-lg px-4">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
